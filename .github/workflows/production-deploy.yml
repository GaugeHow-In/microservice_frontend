name: Production Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-deploy-main
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy Production to Vercel
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}
    env:
      NODE_VERSION: "24"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate Vercel secrets
        shell: bash
        run: |
          missing=0
          for secret_name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing secret::${secret_name} is not configured for this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Configure the missing Vercel repository or environment secrets before retrying."
            exit 1
          fi

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
          working-directory: .

      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-production-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-production-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-production-${{ env.NODE_VERSION }}-

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        id: deploy
        shell: bash
        run: |
          production_url="$(npx vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "production_url=${production_url}" >> "$GITHUB_OUTPUT"
          {
            echo "### Production deployment"
            echo
            echo "- Branch: main"
            echo "- Deployment URL: ${production_url}"
            echo "- Commit: \`${{ github.event.workflow_run.head_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
